name: Bug report
description: Report a defect in skill-indexer
title: '[bug] '
labels: ['bug', 'triage']
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Commands, package.json snippets, or a link to a repo that reproduces the issue.
      render: bash
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: skill-indexer version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: e.g. 20.11.1
    validations:
      required: true
  - type: dropdown
    id: pm
    attributes:
      label: Package manager
      options:
        - npm
        - yarn
        - pnpm
        - bun
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: text
